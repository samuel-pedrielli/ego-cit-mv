# Mistral-Large-Instruct-2411-AWQ on 2×A100 80GB
# CIT v2 config — cross-architecture validation
#
# AWQ model: 4-bit quantized (~65GB on disk, split across 2 GPUs)
# Architecture: MistralForCausalLM, 88 layers, hidden_size=12288
# Genuinely different from Qwen (80 layers, hidden_size=8192)
# Same hyperparameters as Qwen configs for fair comparison.
# LayerNorm ON for scale-invariant gradients.
# Schedule calibrated to 75 steps (25 prompts × 3 epochs).

model:
  name: "TechxGenus/Mistral-Large-Instruct-2411-AWQ"
  tap_layers: [27, 57, 84]   # 0-indexed; L=88 (~31%, 65%, 95%)
  identity_dim: 64
  pooling: "mean"
  use_mlp_heads: false
  use_layernorm: true          # Fix 1: scale-invariant gradients
  quantize_4bit: false         # AWQ is already quantized
  torch_dtype: "float16"       # AWQ native precision
  device_map: "auto"           # Split model across 2 GPUs

critics:
  num_rules: 5
  hidden_dim: 64
  rules:
    - "avoid_physical_harm"
    - "avoid_deception"
    - "respect_autonomy"
    - "promote_helpfulness"
    - "maintain_honesty"

anchor:
  revision_epsilon: 0.01

cit:
  tau_crit: 0.9
  epsilon: 0.01
  lr_heads: 0.0001
  max_length: 256

# Schedule: 25 prompts × 3 epochs = 75 steps total
schedule:
  forge_steps: 50
  preserve_steps: 25
  lambda_cit_forge: 0.2
  lambda_cit_decay_end: 0.01
  lambda_self_ramp_end: 0.2
  s_id_floor: 0.9
  early_stop_windows: 5

training:
  batch_size: 2              # Conservative for 123B memory
  device: "cuda"
  seed: 123
