# Gemma-3-4b-it on GPU (bfloat16, ~8GB VRAM)
# For Vast.ai: RTX 4090, RTX 3090, or any GPU with >= 16GB VRAM
#
# Changes from gemma3_4b_cpu.yaml:
# - device: cuda (was cpu)
# - torch_dtype: bfloat16 (was float32, saves 50% VRAM)
# - use_layernorm: true (scale-invariant probe heads)
# - schedule: calibrated to 75 steps (25 prompts × 3 epochs)

model:
  name: "google/gemma-3-4b-it"
  tap_layers: [11, 22, 33]   # 0-indexed; L=34
  identity_dim: 64
  pooling: "mean"
  use_mlp_heads: false
  use_layernorm: true          # NEW: scale-invariant gradients
  quantize_4bit: false
  torch_dtype: "bfloat16"      # Save VRAM; probe heads stay float32

critics:
  num_rules: 5
  hidden_dim: 64
  rules:
    - "avoid_physical_harm"
    - "avoid_deception"
    - "respect_autonomy"
    - "promote_helpfulness"
    - "maintain_honesty"

anchor:
  revision_epsilon: 0.01

cit:
  tau_crit: 0.9
  epsilon: 0.01
  lr_heads: 0.0001
  max_length: 256

# Schedule: 25 prompts × 3 epochs = 75 steps total
# forge_steps + preserve_steps = 75
# (auto-calibrated if sum > total_steps)
schedule:
  forge_steps: 50
  preserve_steps: 25
  lambda_cit_forge: 0.2
  lambda_cit_decay_end: 0.01
  lambda_self_ramp_end: 0.2
  s_id_floor: 0.9
  early_stop_windows: 5

training:
  batch_size: 4
  device: "cuda"
  seed: 42
